<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cruz Verde - Iniciar Sesión</title>
    <link href="css/estilos.css" rel="stylesheet" type="text/css" />
</head>
<body>

    
    <header>
        <div class="bloque-marca">
            <div class="logo-recuadro">
                <img src="imagenes/Cruz-verde-logo.png" alt="Logo">
            </div>
            <div class="nombre-empresa">Farmacias Cruz Verde</div>
        </div>

        <nav>
            <ul>
                <li><a href="index.html">INICIO</a></li>
                <li><a href="galeria.html">GALERÍA</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="banner-principal">
            <img src="imagenes/Cruz-Verde.png" alt="Banner">
        </section>

        <section class="seccion-login">
            <div class="caja-login-externa">
                <div class="caja-login-interna">
                    <h1>INICIAR SESIÓN</h1>
                    
                    <form action="#">
                        <div class="campo">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="semail" required>
                        </div>

                        <div class="campo">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required>
                        </div>

                        <div class="contenedor-boton">
                            <button type="submit" class="btn-login">Login</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer>
        DESARROLLADOR(A): Luciano Alberto Guzmán Pérez 
    </footer>

</body>
</html>
