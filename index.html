<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cruz Verde - Inicio</title>
    <link href="css/estilos.css" rel="stylesheet" type="text/css" />
</head>
<body>

    <header>
        <div class="bloque-marca">
            <div class="logo-recuadro">
                <img src="imagenes/Cruz-verde-logo.png" alt="Logo">
            </div>
            <div class="nombre-empresa">Farmacias Cruz Verde</div>
        </div>

        <nav>
            <ul>
                <li><a href="login.html">INICIAR SESIÓN</a></li>
                <li><a href="galeria.html">GALERÍA</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="banner-principal">
            <img src="imagenes/Cruz-Verde.png" alt="Banner">
        </section>

        <section class="seccion-info">
            <div class="caja-gerente">
                <img src="imagenes/Gerente.jpg" alt="Gerente">
            </div>
            <div class="caja-datos">
                <p><strong>RUT EMPRESA:</strong> 76.575.523-k</p>
                <p><strong>RUBRO EMPRESA:</strong> Farmacéutico y bienestar</p>
                <p><strong>DIRECCIÓN:</strong> Arturo Prat 140, Rengo</p>
                <p><strong>AÑO FUNDACIÓN:</strong> 1984</p>
            </div>
        </section>

        <section class="seccion-representativa">
            <div class="recuadro-externo">
                <div class="recuadro-interno">
                    <img src="imagenes/Imagen-frontis.jpg" alt="Sucursal">
                </div>
            </div>
        </section>
    </main>

    <footer>
        DESARROLLADOR(A): Luciano Alberto Guzmán Pérez
